version: "3"

tasks:
  nixos:switch:
    desc: Switches nixos configuration
    dir: "{{.ROOT_DIR}}"
    env:
      NIXPKGS_ALLOW_UNFREE: "1"
    requires:
      vars:
        - NAME
    cmds:
      - sudo nixos-rebuild switch --flake .#{{.NAME}} --impure

  home:switch:
    desc: Switches home-manager configuration
    dir: "{{.ROOT_DIR}}"
    env:
      HOME_MANAGER_BACKUP_EXT: "bak"
      NIXPKGS_ALLOW_UNFREE: "1"
    requires:
      vars:
        - NAME
    cmds:
      - nix run .#homeConfigurations.{{.NAME}}.activationPackage --impure

  flake:show:
    desc: Shows flake outputs
    dir: "{{.ROOT_DIR}}"
    cmds:
      - nix flake show --all-systems

  fmt:
    desc: Formats Nix files
    dir: "{{.ROOT_DIR}}"
    cmds:
      - nix fmt

  home:check:
    desc: Evaluates home-manager activation package
    dir: "{{.ROOT_DIR}}"
    env:
      NIXPKGS_ALLOW_UNFREE: "1"
    requires:
      vars:
        - NAME
    cmds:
      - nix eval .#homeConfigurations.{{.NAME}}.activationPackage.drvPath --impure

  nixos:check:
    desc: Evaluates NixOS system closure
    dir: "{{.ROOT_DIR}}"
    env:
      NIXPKGS_ALLOW_UNFREE: "1"
    requires:
      vars:
        - NAME
    cmds:
      - nix eval .#nixosConfigurations.{{.NAME}}.config.system.build.toplevel.drvPath --impure
